project:
  name: player-performance-environment-intelligence
  domain: gaming-analytics

conventions:
  table_name_pattern: <layer>_<domain>_<entity>
  run_id_format: yyyyMMddHHmmss
  partition_defaults:
    bronze: [ingest_date]
    silver: [event_date]
    gold: [event_date]

regions:
  - NA
  - EUW
  - EUNE
  - KR
  - BR
  - LAN
  - LAS
  - OCE
  - JP

paths:
  raw_riot: ${var.volume_root}/bronze/riot/raw
  raw_weather: ${var.volume_root}/bronze/weather/raw
  raw_google_trends: ${var.volume_root}/bronze/google_trends/raw
  checkpoint_root: ${var.volume_root}/_checkpoints

governance:
  pii_policy: no_direct_pii_storage
  secrets_scope: kv_databricks_scope
  quality_sla:
    riot_freshness_minutes: 20
    weather_freshness_minutes: 70
    google_trends_freshness_minutes: 1560
