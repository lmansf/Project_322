sources:
  riot:
    schedule: every_15_minutes
    endpoints:
      - /lol/match/v5/matches/{matchId}
      - /lol/match/v5/matches/{matchId}/timeline
      - /lol/platform/v3/champion-rotations
    cursor_column: ingestion_cursor
    idempotency_key: match_id
    retry:
      max_retries: 5
      backoff_seconds: 2

  weather:
    schedule: hourly
    provider: openweather
    endpoint: /data/2.5/weather
    cursor_column: snapshot_ts
    idempotency_key: region_code_snapshot_hour
    retry:
      max_retries: 5
      backoff_seconds: 2

  google_trends:
    schedule: daily
    provider: pytrends
    term_groups:
      champions:
        - ahri
        - yasuo
        - jinx
      patches:
        - league of legends patch
        - lol patch notes
    geos:
      - US
      - DE
      - KR
    cursor_column: snapshot_date
    idempotency_key: trend_series_key
    retry:
      max_retries: 5
      backoff_seconds: 2
