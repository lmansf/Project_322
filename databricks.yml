bundle:
  name: player-performance-environment-intelligence

include:
  - workflows/jobs/*.yml

targets:
  dev:
    default: true
    mode: development
    variables:
      catalog: game_intel_dev
      schema: lakehouse
      volume_root: /Volumes/game_intel_dev/default/lakehouse

  prod:
    mode: production
    variables:
      catalog: game_intel_prod
      schema: lakehouse
      volume_root: /Volumes/game_intel_prod/default/lakehouse

variables:
  catalog:
    description: Unity Catalog name
  schema:
    description: Unity schema name
  volume_root:
    description: Unity Volume root path
