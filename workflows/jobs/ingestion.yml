resources:
  jobs:
    riot_ingestion:
      name: riot_ingestion
      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: UTC
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pyyaml>=6.0
              - requests>=2.32.0
              - pytrends>=4.9.2
      tasks:
        - task_key: ingest_riot
          notebook_task:
            notebook_path: ../../notebooks/bronze/ingest_riot.py
            base_parameters:
              source_name: riot
          environment_key: default

    weather_ingestion:
      name: weather_ingestion
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pyyaml>=6.0
              - requests>=2.32.0
              - pytrends>=4.9.2
      tasks:
        - task_key: ingest_weather
          notebook_task:
            notebook_path: ../../notebooks/bronze/ingest_weather.py
            base_parameters:
              source_name: weather
          environment_key: default

    google_trends_ingestion:
      name: google_trends_ingestion
      schedule:
        quartz_cron_expression: "0 15 2 * * ?"
        timezone_id: UTC
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pyyaml>=6.0
              - requests>=2.32.0
              - pytrends>=4.9.2
      tasks:
        - task_key: ingest_google_trends
          notebook_task:
            notebook_path: ../../notebooks/bronze/ingest_google_trends.py
            base_parameters:
              source_name: google_trends
          environment_key: default
