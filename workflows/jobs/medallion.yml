resources:
  jobs:
    medallion_pipeline:
      name: medallion_pipeline
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pyyaml>=6.0
              - requests>=2.32.0
              - pytrends>=4.9.2
      tasks:
        - task_key: riot_to_silver
          notebook_task:
            notebook_path: ../../notebooks/silver/riot_conform.py
          environment_key: default

        - task_key: weather_to_silver
          notebook_task:
            notebook_path: ../../notebooks/silver/weather_align.py
          environment_key: default

        - task_key: google_trends_to_silver
          notebook_task:
            notebook_path: ../../notebooks/silver/google_trends_normalize.py
          environment_key: default

        - task_key: id_churn_to_silver
          depends_on:
            - task_key: riot_to_silver
            - task_key: google_trends_to_silver
          notebook_task:
            notebook_path: ../../notebooks/silver/id_churn_metrics.py
          environment_key: default

        - task_key: gold_match_outcome_features
          depends_on:
            - task_key: riot_to_silver
            - task_key: weather_to_silver
            - task_key: google_trends_to_silver
            - task_key: id_churn_to_silver
          notebook_task:
            notebook_path: ../../notebooks/gold/features_match_outcome.py
          environment_key: default

        - task_key: gold_player_tilt_features
          depends_on:
            - task_key: riot_to_silver
            - task_key: google_trends_to_silver
            - task_key: id_churn_to_silver
          notebook_task:
            notebook_path: ../../notebooks/gold/features_player_tilt.py
          environment_key: default

        - task_key: gold_analytics_marts
          depends_on:
            - task_key: gold_match_outcome_features
            - task_key: gold_player_tilt_features
          notebook_task:
            notebook_path: ../../notebooks/gold/marts_analytics.py
          environment_key: default
